<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Water Innovation Pump Inquiry</title>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>

body{
font-family:Segoe UI;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.form-box{
background:white;
padding:30px;
width:450px;
border-radius:12px;
box-shadow:0 15px 40px rgba(0,0,0,0.4);
}

h2{
text-align:center;
color:#203a43;
}

label{
font-size:14px;
font-weight:bold;
}

input,select{
width:100%;
padding:10px;
margin:6px 0 15px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#203a43;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#162a31;
}

.success{
color:green;
text-align:center;
margin-top:10px;
}

.error{
color:red;
text-align:center;
margin-top:10px;
}

</style>

</head>

<body>

<div class="form-box">

<h2>Milton Roy Pump Enquiry</h2>

<form id="pumpForm">

<label>Company Name</label>
<input type="text" name="company" required>

<label>Contact Person</label>
<input type="text" name="person" required>

<label>Email</label>
<input type="email" name="email" required>

<label>Phone Number</label>
<input type="text" name="phone">

<label>Pump Model</label>
  <select name="model">
  <option>Proteus Series</option>
  <option>MROY Series</option>
  <option>Milroyal Series</option>
  <option>PN Series Packed Plunger</option>
  <option>PRIMEROYAL Series</option>
  <option>MAXROY Series</option>
  <option>Milton Roy UC-11 Series EMAG</option>
  <option>Milton Roy UC-12 Series EMAG</option>
  <option>Milton Roy A-Series EMAG</option>
  <option>Milton Roy B-Series EMAG</option>
  <option>Milton Roy D-Series EMAG</option>
  <option>Milton Roy V-Series EMAG</option>
  <option>Milton Roy GB-Series MAD</option>
  <option>Milton Roy M-Series MAD</option>
  <option>Milton Roy Roytronics Series</option>
  <option>Milton Roy </option>
</select>

<label>Sub Model</label>
<input type="text" name="Sub Model">
  
<label>Flow Rate (LPH)</label>
<input type="text" name="flow">

<label>Pressure (Bar)</label>
<input type="text" name="pressure">

<label>Chemical Used</label>
<input type="text" name="chemical">

<button type="submit">Send Inquiry</button>

</form>

<div id="status"></div>

</div>

<script>

// Initialize EmailJS
(function(){
emailjs.init("YOUR_PUBLIC_KEY");
})();

document.getElementById("pumpForm")
.addEventListener("submit", function(event){

event.preventDefault();

emailjs.sendForm(
"YOUR_SERVICE_ID",
"YOUR_TEMPLATE_ID",
this
)

.then(function(){

document.getElementById("status").innerHTML =
"<div class='success'>Inquiry sent successfully!</div>";

document.getElementById("pumpForm").reset();

},

function(){

document.getElementById("status").innerHTML =
"<div class='error'>Failed to send inquiry.</div>";

});

});

</script>

</body>
</html>
